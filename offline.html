<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Bihar Vihaan Enterprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0f19;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 3rem;
            border-radius: 20px;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            color: #14b8a6;
            margin-top: 0;
        }
        p {
            color: #94a3b8;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            background: linear-gradient(135deg, #14b8a6, #0d9488);
            color: #fff;
            text-decoration: none;
            padding: 0.75rem 1.8rem;
            font-weight: 600;
            border-radius: 8px;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="font-size: 4rem; margin-bottom: 1rem;">📡</div>
        <h1>Connection Lost</h1>
        <p>It seems you are currently offline. Pages you have not cached are unavailable. Please check your network connection and reload.</p>
        <a href="javascript:window.location.reload()" class="btn">Retry Loading</a>
    </div>
</body>
</html>
