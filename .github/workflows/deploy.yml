name: Bihar Vihaan CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository files
      uses: actions/checkout@v4

    - name: Setup PHP Environment
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: pdo, pdo_mysql, gd

    - name: Validate PHP syntax (Syntax Linter)
      run: |
        find . -name "*.php" ! -path "./vendor/*" -type f -print0 | xargs -0 -n 1 -P 4 php -l

    - name: Verify Configuration Files
      run: |
        php -r "if (file_exists('app/Config/config.php')) echo 'Config file exists!';"

  build-docker-image:
    needs: lint-and-validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository files
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build local container image
      run: |
        docker build . --file Dockerfile --tag biharvihaan:latest
