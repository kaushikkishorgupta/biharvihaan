version: '3.8'

services:
  # 1. PHP 8.3 & Apache Web Server
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biharvihaan_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=biharvihaan_db
      - DB_USERNAME=biharvihaan_user
      - DB_PASSWORD=biharvihaan_pass
    depends_on:
      - db
    networks:
      - vihaan_net

  # 2. MySQL 8 Database Server
  db:
    image: mysql:8.0
    container_name: biharvihaan_db
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_password
      MYSQL_DATABASE: biharvihaan_db
      MYSQL_USER: biharvihaan_user
      MYSQL_PASSWORD: biharvihaan_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/var/lib/mysql
      # Automates table creation by loading database.sql during initial setup
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vihaan_net

networks:
  vihaan_net:
    driver: bridge

volumes:
  mysql_data:
    driver: local
